<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cosmic Compass — Password Reset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    background: #F7F2FA;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #3A3450;
    padding: 24px;
    box-sizing: border-box;
  }
  main {
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
  h1 {
    font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    font-weight: 600;
    font-size: 2.5rem;
    color: #7C5CFC;
    margin: 0 0 16px;
  }
  p {
    font-size: 1.1rem;
    line-height: 1.6;
    margin: 0 0 16px;
  }
  form {
    text-align: left;
  }
  label {
    display: block;
    font-size: 0.9rem;
    font-weight: 600;
    margin: 16px 0 6px;
  }
  input[type="password"] {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 12px;
    font-size: 1rem;
    border: 1px solid #D9D0EE;
    border-radius: 8px;
    background: #FFFFFF;
    color: #3A3450;
  }
  input[type="password"]:focus {
    outline: 2px solid #7C5CFC;
    outline-offset: 1px;
  }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 12px;
    font-size: 1rem;
    font-weight: 600;
    color: #FFFFFF;
    background: #7C5CFC;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button:disabled {
    opacity: 0.6;
    cursor: default;
  }
  .error {
    color: #B3261E;
    font-size: 0.95rem;
    margin: 12px 0 0;
    text-align: left;
  }
  .hidden {
    display: none;
  }
</style>
</head>
<body>
<main>
  <h1 id="heading">Reset your password</h1>

  <p id="status-message">Verifying your link&hellip;</p>

  <form id="reset-form" class="hidden">
    <label for="password">New password</label>
    <input type="password" id="password" autocomplete="new-password" required>

    <label for="confirm-password">Confirm password</label>
    <input type="password" id="confirm-password" autocomplete="new-password" required>

    <p class="error hidden" id="form-error"></p>

    <button type="submit" id="submit-button">Set new password</button>
  </form>
</main>

<script>
  const SUPABASE_URL = 'https://zmosjyybquyfrmvzbsen.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_VRVxgzXV6ods7yu0zB2-Dw_8vhuX5QT';
  const MIN_PASSWORD_LENGTH = 6;

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const heading = document.getElementById('heading');
  const statusMessage = document.getElementById('status-message');
  const resetForm = document.getElementById('reset-form');
  const formError = document.getElementById('form-error');
  const submitButton = document.getElementById('submit-button');

  function showError(message) {
    heading.textContent = 'Something went wrong';
    statusMessage.textContent = message;
    resetForm.classList.add('hidden');
  }

  function showSuccess() {
    heading.textContent = "All set!";
    statusMessage.textContent = 'Your password has been reset. Head back to the Cosmic Compass app to log in.';
    resetForm.classList.add('hidden');
  }

  // The app's Supabase client uses the implicit auth flow (see
  // SupabaseService.initialize()), so the recovery link carries a
  // self-contained access token in the URL fragment (#access_token=...)
  // rather than a `code` query param that requires exchanging against a
  // locally-stored PKCE verifier -- this page runs in a different
  // browser/device than the one that requested the reset, so it has no
  // access to any such verifier. supabase-js auto-detects and consumes
  // that fragment (detectSessionInUrl, on by default) and fires a
  // PASSWORD_RECOVERY auth event once it has established a session from it.
  function init() {
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const hashError = hashParams.get('error_description');
    if (hashError) {
      showError(hashError.replace(/\+/g, ' '));
      return;
    }

    let recoveryHandled = false;
    supabaseClient.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        recoveryHandled = true;
        statusMessage.textContent = 'Choose a new password for your account.';
        resetForm.classList.remove('hidden');
      }
    });

    // supabase-js resolves the fragment locally (no network round trip
    // needed to know whether a token was present at all), so a short
    // window is enough to tell "no link"/expired apart from "still working".
    setTimeout(() => {
      if (!recoveryHandled) {
        showError('This link is missing, expired, or has already been used. Please request a new password reset email.');
      }
    }, 2000);
  }

  resetForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    formError.classList.add('hidden');

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (password.length < MIN_PASSWORD_LENGTH) {
      formError.textContent = `Password must be at least ${MIN_PASSWORD_LENGTH} characters.`;
      formError.classList.remove('hidden');
      return;
    }
    if (password !== confirmPassword) {
      formError.textContent = 'Passwords do not match.';
      formError.classList.remove('hidden');
      return;
    }

    submitButton.disabled = true;
    submitButton.textContent = 'Setting password…';

    const { error } = await supabaseClient.auth.updateUser({ password });

    if (error) {
      formError.textContent = error.message || 'Could not update your password. Please try again.';
      formError.classList.remove('hidden');
      submitButton.disabled = false;
      submitButton.textContent = 'Set new password';
      return;
    }

    showSuccess();
  });

  init();
</script>
</body>
</html>
